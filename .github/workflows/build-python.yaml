# This is a basic workflow to help you get started with Actions

name: CI-python

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  create:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Create Build.exe
        uses: sayyid5416/pyinstaller@v1
        with:
          python_ver: '3.10'
          spec: 'build.spec'
          requirements: 'requirements.txt'

      - name: Create Prepare.exe
        uses: sayyid5416/pyinstaller@v1
        with:
          python_ver: '3.10'
          spec: 'prepare.spec'
          requirements: 'requirements.txt'

      - name: Copy CSV folders
        run: cp -r ./CSV ./dist
      - name: Copy XML folders
        run: cp -r ./XML ./dist
      - name: Copy Placeholder folders
        run: cp -r ./Placeholder ./dist
      - name: Copy README.md
        run: cp -r ./README.md ./dist
      - name: Rename dist folder
        run: dist ShadowboutBuilder_${{ github.ref_name }}
      - name: Zip it
        run: zip -r ShadowboutBuilder_${{ github.ref_name }}.zip ShadowboutBuilder_${{ github.ref_name }}/*

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
            repo_token: ${{ secrets.GITHUB_TOKEN }}
            file: ShadowboutBuilder_${{ github.ref_name }}.zip
            asset_name: ShadowboutBuilder_exe_${{ github.ref_name }}.zip
            tag: ${{ github.ref_name }}
            overwrite: true